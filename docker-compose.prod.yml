services:
  backend:
    image: ${IMAGE_BACKEND}:${IMAGE_TAG:-latest}
    container_name: n8n-backend
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET_KEY=${JWT_SECRET}
    networks:
      - n8n-network
    ports:
      - "5000:5000"
    healthcheck:
      test: >
        node -e "
        const http = require('http');
        const req = http.get('http://localhost:5000/api/v1/health', (res) => {
          process.exit(res.statusCode === 200 ? 0 : 1);
        });
        req.on('error', () => process.exit(1));
        "
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 45s

  frontend:
    image: ${IMAGE_FRONTEND}:${IMAGE_TAG:-latest}
    container_name: n8n-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge