services:
  backend:
    image: ${IMAGE_BACKEND}:${IMAGE_TAG:-latest}
    container_name: n8n-backend
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    env_file:
      - .env.production
    networks:
      - n8n-network
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/v1/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${IMAGE_FRONTEND}:${IMAGE_TAG:-latest}
    container_name: n8n-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge